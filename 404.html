<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable — Famille Chevalier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(160deg, #1E1B4B, #312E81); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
        .container { max-width: 500px; }
        .emoji { font-size: 5rem; margin-bottom: 16px; }
        h1 { font-size: 2rem; font-weight: 900; margin-bottom: 12px; }
        p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 32px; line-height: 1.6; }
        a { display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; border-radius: 50px; background: linear-gradient(135deg, #FF6B35, #FF8F5E); color: white; font-weight: 800; font-size: 1rem; text-decoration: none; transition: all 0.3s; }
        a:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">📚</div>
        <h1>Oups, cette page n'existe pas !</h1>
        <p>On dirait que tu t'es perdu dans une aventure... Pas de panique, retourne à la bibliothèque !</p>
        <a href="/">← Retour à l'accueil</a>
    </div>
</body>
</html>
